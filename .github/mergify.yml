pull_request_rules:
  - name: Add needs-dco label when DCO check failed
    conditions:
      # branch condition: in this pull request, the changes are based on any branch referenced by BRANCHES
      - or: &BRANCHES
      #  In this pull request, the changes are based on the master branch
          - &MASTER_BRANCH base=master
      #  In this pull request, the changes are based on the 2.x branch
          - &2X_BRANCH base~=2\.\d

      - -status-success=DCO
    actions:
      label:
        remove:
          - dco-passed
        add:
          - needs-dco
      comment:
        message: |
          @{{author}} Thanks for your contribution. Please submit with DCO, see the contributing guide https://github.com/milvus-io/milvus/blob/master/CONTRIBUTING.md#developer-certificate-of-origin-dco.

  - name: Add dco-passed label when DCO check passed
    conditions:
      # branch condition: in this pull request, the changes are based on any branch referenced by BRANCHES
      - or: *BRANCHES
      - status-success=DCO
    actions:
      label:
        remove:
          - needs-dco
        add:
          - dco-passed

  - name: Test passed for code changed
    conditions:
      - or: *BRANCHES
      - and:
          # The `Detect path changes` job must succeed — otherwise the gated
          # jobs below would be skipped (because `needs: changes` failed)
          # and we'd wrongly treat that as ci-passed.
          - "check-success=Detect path changes"
          - "check-success=Build and test AMD64 Ubuntu 20.04"
          - "check-success=Build and test AMD64 Fedora 39"
          # The following jobs are gated by the path-filter `changes` job
          # and are skipped for examples-only changes. Accept success OR
          # skipped so examples-only PRs still reach ci-passed.
          - or:
              - "check-success=Test all with coverage"
              - "check-skipped=Test all with coverage"
          - or:
              - "check-success=Build and test macOS 15"
              - "check-skipped=Build and test macOS 15"
          - or:
              - "check-success=Build and test windows"
              - "check-skipped=Build and test windows"
    actions:
      label:
        add:
          - ci-passed

  - name: Remove ci-passed when checks are not green
    conditions:
      - or: *BRANCHES
      - or:
          - "check-pending=Detect path changes"
          - "check-pending=Build and test AMD64 Ubuntu 20.04"
          - "check-pending=Build and test AMD64 Fedora 39"
          - "check-pending=Test all with coverage"
          - "check-pending=Build and test macOS 15"
          - "check-pending=Build and test windows"
          - "check-failure=Detect path changes"
          - "check-failure=Build and test AMD64 Ubuntu 20.04"
          - "check-failure=Build and test AMD64 Fedora 39"
          - "check-failure=Test all with coverage"
          - "check-failure=Build and test macOS 15"
          - "check-failure=Build and test windows"
    actions:
      label:
        remove:
          - ci-passed

  - name: Add ci-passed when no code changes
    conditions:
      - or: *BRANCHES
      - -files~=^(?!.*\.(md)).*$
    actions:
      label:
        add:
          - ci-passed
